<script>
  (function () {
    const giscusOrigin = "https://giscus.app";
    const giscusScript = document.createElement("script");
    const currentScript = document.currentScript;

    const getGiscusTheme = () => {
      return document.documentElement.classList.contains("dark") ? "dark" : "light";
    };

    const setGiscusTheme = () => {
      const theme = getGiscusTheme();
      giscusScript.setAttribute("data-theme", theme);

      const giscusFrame = document.querySelector("iframe.giscus-frame");
      if (!giscusFrame) return;

      giscusFrame.contentWindow.postMessage(
        {
          giscus: {
            setConfig: {
              theme: theme,
            },
          },
        },
        giscusOrigin,
      );
    };

    giscusScript.src = "https://giscus.app/client.js";
    giscusScript.setAttribute("data-repo", "azurtian/azurtian.github.io");
    giscusScript.setAttribute("data-repo-id", "R_kgDOTIwRzg");
    giscusScript.setAttribute("data-category", "Announcements");
    giscusScript.setAttribute("data-category-id", "DIC_kwDOTIwRzs4DAKIs");
    giscusScript.setAttribute("data-mapping", "pathname");
    giscusScript.setAttribute("data-strict", "0");
    giscusScript.setAttribute("data-reactions-enabled", "1");
    giscusScript.setAttribute("data-emit-metadata", "0");
    giscusScript.setAttribute("data-input-position", "top");
    giscusScript.setAttribute("data-theme", getGiscusTheme());
    giscusScript.setAttribute("data-lang", "zh-CN");
    giscusScript.setAttribute("data-loading", "lazy");
    giscusScript.setAttribute("crossorigin", "anonymous");
    giscusScript.async = true;

    giscusScript.addEventListener("load", () => {
      window.setTimeout(setGiscusTheme, 0);
      window.setTimeout(setGiscusTheme, 500);
    });

    const observer = new MutationObserver(setGiscusTheme);
    observer.observe(document.documentElement, {
      attributes: true,
      attributeFilter: ["class"],
    });

    currentScript.parentNode.insertBefore(giscusScript, currentScript);
  })();
</script>
